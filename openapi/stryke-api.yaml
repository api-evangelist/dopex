info:
  title: Stryke API
  description: ''
  version: '1.0'
  contact: {}
tags:
  - name: CLAMM
    description: ''
servers:
  - url: https://api.stryke.xyz
components:
  schemas:
    TokenDto:
      type: object
      properties:
        address:
          type: string
          description: Address of the ERC20 token
        decimals:
          type: string
          description: Decimals of the ERC20 token
        symbol:
          type: string
          description: Symbol of the ERC20 token
      required:
        - address
        - decimals
        - symbol
    QuoteResponseDto:
      type: object
      properties:
        token:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TokenDto'
        premium:
          type: string
          readOnly: true
        fees:
          type: string
          readOnly: true
      required:
        - token
        - premium
        - fees
    PurchasePositionMetaHandlerDto:
      type: object
      properties:
        name:
          type: string
          readOnly: true
        deprecated:
          type: boolean
          readOnly: true
        handler:
          type: object
          readOnly: true
        pool:
          type: object
          readOnly: true
      required:
        - name
        - deprecated
        - handler
        - pool
    PurchasePositionMetaDto:
      type: object
      properties:
        tokenId:
          type: string
          readOnly: true
        expiry:
          type: number
          readOnly: true
        handlers:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/PurchasePositionMetaHandlerDto'
        liquidities:
          readOnly: true
          type: array
          items:
            type: string
      required:
        - tokenId
        - expiry
        - handlers
        - liquidities
    PurchasePositionsResponseDto:
      type: object
      properties:
        size:
          type: string
          readOnly: true
        premium:
          type: string
          readOnly: true
        strike:
          type: number
          readOnly: true
        type:
          type: string
          readOnly: true
          enum:
            - call
            - put
        token:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TokenDto'
        meta:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PurchasePositionMetaDto'
      required:
        - size
        - premium
        - strike
        - type
        - token
        - meta
    PurchaseHistoryResponseDto:
      type: object
      properties:
        txHash:
          type: object
          readOnly: true
        timestamp:
          type: number
          readOnly: true
        strike:
          type: number
          readOnly: true
        size:
          type: string
          readOnly: true
        ttl:
          type: number
          readOnly: true
        type:
          type: string
          readOnly: true
          enum:
            - call
            - put
        premium:
          type: string
          readOnly: true
        token:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TokenDto'
      required:
        - txHash
        - timestamp
        - strike
        - size
        - ttl
        - type
        - premium
        - token
    TransactionData:
      type: object
      properties:
        to:
          type: string
          description: Address to send the transaction calldata to
        data:
          type: string
          description: Transaction calldata
      required:
        - to
        - data
    IntersectionAmountTokenDto:
      type: object
      properties:
        amount:
          type: string
        address:
          type: string
          description: Address of the ERC20 token
        decimals:
          type: string
          description: Decimals of the ERC20 token
        symbol:
          type: string
          description: Symbol of the ERC20 token
      required:
        - amount
        - address
        - decimals
        - symbol
    PrepareDepositResponseDto__Tokens:
      type: object
      properties:
        callToken:
          description: Call token details and amount
          allOf:
            - $ref: '#/components/schemas/IntersectionAmountTokenDto'
        putToken:
          description: Put token details and amount
          allOf:
            - $ref: '#/components/schemas/IntersectionAmountTokenDto'
      required:
        - callToken
        - putToken
    PrepareDepositResponseDto:
      type: object
      properties:
        tx:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/TransactionData'
        strikes:
          readOnly: true
          type: array
          items:
            type: number
        tokens:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/PrepareDepositResponseDto__Tokens'
      required:
        - tx
        - strikes
        - tokens
    Strikes:
      type: object
      properties:
        call:
          type: number
          description: Call strike
        put:
          type: number
          description: Put strike
      required:
        - call
        - put
    LiquidityToken0Token1:
      type: object
      properties:
        amount0:
          type: string
          description: Amount of token0 provided as liquidity
        amount1:
          type: string
          description: Amount of token1 provided as liquidity
      required:
        - amount0
        - amount1
    Token0Token1:
      type: object
      properties:
        token0:
          description: Token0 details and amount
          allOf:
            - $ref: '#/components/schemas/TokenDto'
        token1:
          description: Token1 token details and amount
          allOf:
            - $ref: '#/components/schemas/TokenDto'
      required:
        - token0
        - token1
    HandlerMeta:
      type: object
      properties:
        name:
          type: string
        deprecated:
          type: boolean
        handler:
          type: object
        pool:
          type: string
      required:
        - name
        - deprecated
        - handler
        - pool
    DepositHistoryResponseDto:
      type: object
      properties:
        strikes:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Strikes'
        txHash:
          type: string
          readOnly: true
        timestamp:
          type: number
          readOnly: true
        liquidity:
