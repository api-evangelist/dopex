openapi: 3.0.0
paths:
  /clamm/purchase/quote:
    get:
      operationId: PurchaseController_getQuote
      summary: Get quote for purchasing options
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: optionMarket
          required: true
          in: query
          description: Address of the option market
          schema:
            type: string
        - name: user
          required: true
          in: query
          schema:
            type: string
        - name: strike
          required: true
          in: query
          schema:
            type: number
        - name: markPrice
          required: true
          in: query
          schema:
            type: number
        - name: type
          required: true
          in: query
          schema:
            enum:
              - call
              - put
            type: string
        - name: amount
          required: true
          in: query
          schema:
            type: number
        - name: ttl
          required: true
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Get cost of purchasing an option
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponseDto'
      tags:
        - purchase
  /clamm/purchase/positions:
    get:
      operationId: PurchaseController_getPurchasePositions
      summary: Get current options positions of a user
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: optionMarket
          required: true
          in: query
          description: Address of the option market
          schema:
            type: string
        - name: user
          required: true
          in: query
          description: Address of the user
          schema:
            type: string
        - name: first
          required: true
          in: query
          description: Pagination parameter for first (Similar to Qraphql)
          schema:
            enum:
              - 100
              - 200
              - 300
            type: number
        - name: skip
          required: true
          in: query
          description: Pagination parameter for skip (Similar to Qraphql)
          schema:
            enum:
              - 0
              - 100
              - 200
            type: number
      responses:
        '200':
          description: List of options positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchasePositionsResponseDto'
      tags:
        - purchase
  /clamm/purchase/history:
    get:
      operationId: PurchaseController_getHistory
      summary: Get history of options purchases for a user
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: optionMarket
          required: true
          in: query
          description: Address of the option market
          schema:
            type: string
        - name: user
          required: true
          in: query
          description: Address of the user
          schema:
            type: string
        - name: first
          required: true
          in: query
          description: Pagination parameter for first (Similar to Qraphql)
          schema:
            enum:
              - 100
              - 200
              - 300
            type: number
        - name: skip
          required: true
          in: query
          description: Pagination parameter for skip (Similar to Qraphql)
          schema:
            enum:
              - 0
              - 100
              - 200
            type: number
      responses:
        '200':
          description: History of options purchases by an address
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchaseHistoryResponseDto'
      tags:
        - purchase
  /clamm/deposit/prepare:
    get:
      operationId: DepositController_prepareDeposit
      summary: >-
        Prepare a executable transaction and a summary for providing liquidity
        into CLAMM
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: pool
          required: true
          in: query
          description: Address of the token pair pool
          schema:
            type: string
        - name: hook
          required: true
          in: query
          description: Address of the hook to deposit through
          schema:
            type: string
        - name: handler
          required: true
          in: query
          description: Address of the handler to deposit through
          schema:
            type: string
        - name: maxStrike
          required: true
          in: query
          description: Range max strike price
          schema:
            type: number
        - name: minStrike
          required: true
          in: query
          description: Range min strike price
          schema:
            type: number
        - name: optionsAmount
          required: true
          in: query
          description: Amount of options to provide liquidity for.
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareDepositResponseDto'
      tags:
        - deposit
  /clamm/deposit/history:
    get:
      operationId: DepositController_getHistory
      summary: Get history of deposit activity
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: first
          required: true
          in: query
          description: Pagination parameter for first (Similar to Qraphql)
          schema:
            enum:
              - 100
              - 200
              - 300
            type: number
        - name: skip
          required: true
          in: query
          description: Pagination parameter for skip (Similar to Qraphql)
          schema:
            enum:
              - 0
              - 100
              - 200
            type: number
        - name: pool
          required: true
          in: query
          description: Address of the token pair pool
          schema:
            type: string
        - name: user
          required: true
          in: query
          description: Address of the user
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepositHistoryResponseDto'
      tags:
        - deposit
  /clamm/deposit/positions:
    get:
      operationId: DepositController_getPositions
      summary: Get current deposit positions
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: first
          required: true
          in: query
          description: Pagination parameter for first (Similar to Qraphql)
          schema:
            enum:
              - 100
              - 200
              - 300
            type: number
        - name: skip
          required: true
          in: query
          description: Pagination parameter for skip (Similar to Qraphql)
          schema:
            enum:
              - 0
              - 100
              - 200
            type: number
        - name: pool
          required: true
          in: query
          description: Address of the token pair pool
          schema:
            type: string
        - name: user
          required: true
          in: query
          description: Address of the user
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepositPositionsResponseDto'
      tags:
        - deposit
  /clamm/withdraw/history:
    get:
      operationId: WithdrawController_getHistory
      summary: Get history of withdraws from CLAMM for a user
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: user
          required: true
          in: query
          description: Address of the user
          schema:
            type: string
        - name: first
          required: true
          in: query
          description: Pagination parameter for first (Similar to Qraphql)
          schema:
            enum:
              - 100
              - 200
              - 300
            type: number
        - name: skip
          required: true
          in: query
          description: Pagination parameter for skip (Similar to Qraphql)
          schema:
            enum:
              - 0
              - 100
              - 200
            type: number
        - name: pool
          required: true
          in: query
          description: Address of the token pair pool
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WithdrawHistoryResponseDto'
        '400':
          description: Failed to fetch withdraw history
      tags:
        - withdraw
  /clamm/exercise/prepare:
    get:
      operationId: ExerciseController_getExerciseTx
      summary: Get information required to exercise an options position
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: optionMarket
          required: true
          in: query
          description: Address of the option market
          schema:
            type: string
        - name: optionId
          required: true
          in: query
          description: ERC721 token ID of the options position
          schema:
            type: number
        - name: swapperId
          required: true
          in: query
          description: Swapper contract to route exercise swap through
          schema:
            enum:
              - 1inch
              - uni-v3
            type: string
        - name: slippage
          required: true
          in: query
          description: >-
            Max slippage allowance for the swap that takes place when options'
            position collateral tokens are swapped to the profit token
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareExerciseResponseDto'
      tags:
        - exercise
  /clamm/exercise/history:
    get:
      operationId: ExerciseController_getHistory
      summary: Get history of exercise activity for a user
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
