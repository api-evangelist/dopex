      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: number
      tags:
        - stats
  /clamm/stats/dau:
    get:
      operationId: StatsController_getDau
      summary: Get number of unique users
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
