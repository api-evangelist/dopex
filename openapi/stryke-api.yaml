  /clamm/strikes-chain:
    get:
      operationId: StrikesChainController_getStrikesChain
      summary: Get strikes chain or options chain of a options market
      parameters:
        - name: optionMarket
          required: true
          in: query
          description: Address of the option market
          schema:
            type: string
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: callsReach
          required: true
          in: query
          schema:
            enum:
              - 100
              - 200
            type: number
        - name: putsReach
          required: true
          in: query
          schema:
            enum:
              - 100
              - 200
            type: number
      responses:
        '200':
          description: List of strikes of the option market
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrikesChainResponseDto'
      tags:
        - strikes-chain
  /clamm/option-markets:
