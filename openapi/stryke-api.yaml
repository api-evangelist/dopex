      operationId: StatsController_getTvlForPool
      summary: Get total value locked in a pool specific to CLAMM
      parameters:
        - name: chainId
          required: true
          in: query
          description: Chain ID of the network
          schema:
            enum:
              - 5000
              - 42161
            type: number
        - name: pool
          required: true
          in: path
          description: Address of the pool
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
